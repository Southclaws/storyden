# This is a JSON-RPC 2.0 conformant RPC spec for Storyden plugin integrations.

$schema: "http://json-schema.org/draft-07/schema#"

title: Manifest
type: object
required:
  - id
  - name
  - author
  - description
  - version
  - command
properties:
  id:
    type: string
    example: "my-plugin"
    description: >
      The unique identifier of the plugin. Must match the pattern
      `^[a-zA-Z0-9](?:[a-zA-Z0-9-]*[a-zA-Z0-9])?$`.

      (NOTE: May change in future.)

  name:
    type: string
    example: "My Cool Plugin"
    description: >
      The name of the plugin. This is not a unique identifier and is only used
      for display purposes within the Plugin Registry and Storyden installation.

  author:
    type: string
    example: "you"
    description: >
      The author of the plugin. Must match the pattern
      `^[a-zA-Z0-9](?:[a-zA-Z0-9-]*[a-zA-Z0-9])?$`.

      (NOTE: May change in future.)

  description:
    type: string
    example: "Reacts with a 🔥 to every reply posted."
    description: >
      The description of the plugin. Displayed in Plugin Registries as well as
      in UI of Storyden installations when installed.

  version:
    type: string
    example: "1.0.0"
    description: >
      The version of the plugin. This
      is not used for any versioning or compatibility purposes by the
      runtime and is only used for display purposes currently.

  command:
    type: string
    example: "./myplugin.exe"
    description: >
      The executable or script used to launch your plugin. If your plugin is a
      binary (Go, Rust, C, etc) then this should be a path to that binary, it's
      best to put it in the root of your plugin archive like `./myplugin.exe` or
      `./myplugin`. If your plugin is a script (Python, Node, etc) then this
      should be the interpreter's `$PATH` executable (e.g. `python` or `node`) 
      and you should include the script in the `args` field.

      This field is used only for Supervised plugins. External plugins can
      provide a placeholder value and it will be ignored by the runtime.

      Note that Storyden cannot guarantee that the runtime environment defined
      by the person hosting Storyden will have any language's interpreter on
      the `$PATH`. If you are running your own instance and building a custom
      plugin, you should `FROM` the Storyden base image for your deployment so
      that you know what runtimes are available.

      If you are distributing a plugin for others to use, we highly recommend
      that you use a statically compiled language such as Go, Rust or Zig for
      your plugin so that it's guaranteed to be compatible with any runtime.

  args:
    type: array
    example:
      - "--enable-coolness"
    description: >
      Arguments passed to the "command" invocation.

      This field is used only for Supervised plugins. External plugins can
      omit it or provide placeholder values.
    items:
      type: string

  events_consumed:
    type: array
    example:
      - "EventThreadReplyCreated"
    description: >
      The list of events the plugin subscribes to and will receive from the host
      via RPC. Events allow your plugins to react to things that humans or
      robots do on Storyden.
    items:
      $ref: "common/events.yaml#/$defs/Event"

  access:
    $ref: "#/$defs/ManifestAccess"
    example:
      handle: example-plugin
      name: Example Plugin
      permissions:
        - "CREATE_REACTION"
    description: >
      Optional API access configuration for this plugin. When provided, the
      host can provision a bot account and access key for API calls via RPC.

  configuration_schema:
    $ref: "common/plugin-configuration.yaml"
    example:
      fields:
        - id: webhook_url
          label: Webhook URL
          description: Where to send event notifications.
          type: string

  capabilities:
    type: array
    description: >
      Platform capabilities this plugin provides. Capabilities extend
      Storyden with host-defined integration points such as Robot model
      providers, authentication providers, or Robot tools.
    items:
      $ref: "#/$defs/CapabilityConfig"
    example:
      - type: robot.llm_provider
        id: openrouter
        version: v1

$defs:
  CapabilityConfig:
    oneOf:
      - $ref: "#/$defs/RobotLLMProviderCapabilityConfig"
      - $ref: "#/$defs/RobotToolProviderCapabilityConfig"

  CapabilityConfigBase:
    type: object
    required:
      - type
      - id
      - version
    properties:
      type:
        type: string
        description: Capability type discriminator.
      id:
        type: string
        example: openrouter
        description: >
          Stable capability identifier. For Robot LLM providers, this is the
          provider identifier used in `provider/model` refs. For Robot tool
          providers, this is the provider namespace used to build fully
          qualified Robot tool names.
        pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
      version:
        type: string
        example: v1
        description: Version of the host capability protocol implemented by this plugin.
      name:
        type: string
        example: OpenRouter
        description: Human-readable capability name.
      description:
        type: string
        example: OpenRouter hosted model gateway.

  RobotLLMProviderCapabilityConfig:
    allOf:
      - $ref: "#/$defs/CapabilityConfigBase"
      - type: object
        required:
          - type
        properties:
          type:
            type: string
            const: robot.llm_provider
          structured_output:
            type: boolean
            description: >
              Whether this provider implements the structured prompt RPC for
              JSON Schema constrained single-shot outputs.
          embeddings:
            type: boolean
            description: >
              Whether this provider implements the embedding RPC for semantic
              indexing and retrieval.

  RobotToolProviderCapabilityConfig:
    allOf:
      - $ref: "#/$defs/CapabilityConfigBase"
      - type: object
        required:
          - type
          - tools
        properties:
          type:
            type: string
            const: robot.tool_provider
          tools:
            type: array
            description: Robot tools statically provided by this plugin.
            items:
              $ref: "#/$defs/RobotToolProviderToolConfig"

  RobotToolProviderToolConfig:
    type: object
    required:
      - id
      - name
      - description
      - input_schema
    properties:
      id:
        type: string
        description: Stable provider-local tool identifier.
        pattern: "^[a-zA-Z0-9][a-zA-Z0-9_]*$"
      name:
        type: string
        description: Human-readable tool name.
      title:
        type: string
        description: Optional display title for MCP clients and Robot builders.
      description:
        type: string
      input_schema:
        $ref: "#/$defs/RobotToolJSONSchema"
      output_schema:
        $ref: "#/$defs/RobotToolJSONSchema"
      requires_confirmation:
        type: boolean
      annotations:
        $ref: "#/$defs/RobotToolAnnotations"

  RobotToolAnnotations:
    type: object
    properties:
      readOnlyHint:
        type: boolean
      destructiveHint:
        type: boolean
      idempotentHint:
        type: boolean
      openWorldHint:
        type: boolean

  RobotToolJSONSchema:
    type: object
    additionalProperties: true

  ManifestAccess:
    type: object
    example:
      handle: example-plugin
      name: Example Plugin
      permissions:
        - "CREATE_REACTION"
    required:
      - handle
      - name
      - permissions
    properties:
      handle:
        type: string
        example: example-plugin
        description: >
          The account handle to provision for this plugin's API identity.
      name:
        type: string
        example: Example Plugin
        description: >
          The account display name to provision for this plugin's API identity.
      bio:
        type: string
        example: This account is managed by a Storyden plugin.
        description: Optional profile bio for the provisioned account.
      links:
        type: array
        example:
          - text: Website
            url: https://example.com
        description: Optional profile links for the provisioned account.
        items:
          $ref: "#/$defs/ManifestAccessExternalLink"
      metadata:
        type: object
        example:
          source: plugin
        description: Optional profile metadata for the provisioned account.
        additionalProperties: true
      permissions:
        type: array
        example:
          - "CREATE_REACTION"
          - "CREATE_POST"
        description: >
          The list of permission names requested for API access.
          See https://storyden.org/docs/introduction/members/permissions for available values and descriptions.
        items:
          type: string

  ManifestAccessExternalLink:
    type: object
    example:
      text: Website
      url: https://example.com
    required:
      - text
      - url
    properties:
      text:
        type: string
        example: Website
      url:
        type: string
        format: uri
        example: https://example.com

  # -
  # Host-to-Plugin RPC methods
  # -

  HostToPluginRequest:
    oneOf:
      - $ref: "rpc/host-to-plugin/configure.yaml#/$defs/RPCRequestConfigure"
      - $ref: "rpc/host-to-plugin/event.yaml#/$defs/RPCRequestEvent"
      - $ref: "rpc/host-to-plugin/ping.yaml#/$defs/RPCRequestPing"
      - $ref: "rpc/host-to-plugin/robot_model_provider_list_models.yaml#/$defs/RPCRequestRobotModelProviderListModels"
      - $ref: "rpc/host-to-plugin/robot_model_provider_generate.yaml#/$defs/RPCRequestRobotModelProviderGenerate"
      - $ref: "rpc/host-to-plugin/robot_model_provider_structured_prompt.yaml#/$defs/RPCRequestRobotModelProviderStructuredPrompt"
      - $ref: "rpc/host-to-plugin/robot_model_provider_embed_text.yaml#/$defs/RPCRequestRobotModelProviderEmbedText"
      - $ref: "rpc/host-to-plugin/robot_tool_call.yaml#/$defs/RPCRequestRobotToolCall"

  HostToPluginResponse:
    type: object
    allOf:
      - $ref: "rpc/rpc.yaml#/$defs/JsonRpcResponse"
      - required: [result]
        properties:
          result:
            $ref: "#/$defs/HostToPluginResponseUnion"

  HostToPluginResponseUnion:
    oneOf:
      - $ref: "rpc/host-to-plugin/configure.yaml#/$defs/RPCResponseConfigure"
      - $ref: "rpc/host-to-plugin/event.yaml#/$defs/RPCResponseEvent"
      - $ref: "rpc/host-to-plugin/ping.yaml#/$defs/RPCResponsePing"
      - $ref: "rpc/host-to-plugin/robot_model_provider_list_models.yaml#/$defs/RPCResponseRobotModelProviderListModels"
      - $ref: "rpc/host-to-plugin/robot_model_provider_generate.yaml#/$defs/RPCResponseRobotModelProviderGenerate"
      - $ref: "rpc/host-to-plugin/robot_model_provider_structured_prompt.yaml#/$defs/RPCResponseRobotModelProviderStructuredPrompt"
      - $ref: "rpc/host-to-plugin/robot_model_provider_embed_text.yaml#/$defs/RPCResponseRobotModelProviderEmbedText"
      - $ref: "rpc/host-to-plugin/robot_tool_call.yaml#/$defs/RPCResponseRobotToolCall"

  # -
  # Plugin-to-Host RPC methods
  # -

  PluginToHostRequest:
    oneOf:
      - $ref: "rpc/plugin-to-host/access_get.yaml#/$defs/RPCRequestAccessGet"
      - $ref: "rpc/plugin-to-host/get_config.yaml#/$defs/RPCRequestGetConfig"
      - $ref: "rpc/plugin-to-host/robot_run.yaml#/$defs/RPCRequestRobotRun"

  PluginToHostResponse:
    allOf:
      - $ref: "rpc/rpc.yaml#/$defs/JsonRpcResponse"
      - required: [result]
        properties:
          result:
            $ref: "#/$defs/PluginToHostResponseUnion"

  PluginToHostResponseUnion:
    oneOf:
      - $ref: "rpc/plugin-to-host/access_get.yaml#/$defs/RPCResponseAccessGet"
      - $ref: "rpc/plugin-to-host/get_config.yaml#/$defs/RPCResponseGetConfig"
      - $ref: "rpc/plugin-to-host/robot_run.yaml#/$defs/RPCResponseRobotRun"
