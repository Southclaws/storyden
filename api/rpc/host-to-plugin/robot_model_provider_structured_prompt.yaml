$schema: "http://json-schema.org/draft-07/schema#"
$defs:
  RPCRequestRobotModelProviderStructuredPromptParams:
    type: object
    required:
      - provider
      - model
      - description
      - input
      - schema
    properties:
      provider:
        type: string
        description: Provider identifier declared by the plugin manifest.
      model:
        type: string
        description: Model name within the provider namespace.
      description:
        type: string
        description: Human-readable description of the structured output task.
      input:
        type: string
        description: User input or prompt text for the structured output request.
      schema:
        type: object
        additionalProperties: true
        description: JSON Schema object the response must satisfy.

  RPCRequestRobotModelProviderStructuredPrompt:
    description: >
      Runs one single-shot structured output request through a plugin-backed
      Robot model provider.
    allOf:
      - $ref: "../rpc.yaml#/$defs/JsonRpcRequest"
      - type: object
        required: ["method", "params"]
        properties:
          method:
            type: string
            const: "robot_model_provider_structured_prompt"
          params:
            $ref: "#/$defs/RPCRequestRobotModelProviderStructuredPromptParams"

  RPCResponseRobotModelProviderStructuredPrompt:
    description: >
      Returns JSON text generated by a plugin-backed Robot model provider for a
      JSON Schema constrained structured output request.
    type: object
    required: ["method"]
    properties:
      method:
        type: string
        const: "robot_model_provider_structured_prompt"
      content:
        type: string
        description: JSON text matching the requested schema.
      error:
        type: string
